services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tag2now
      POSTGRES_PASSWORD: tag2now
      POSTGRES_DB: tag2now
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tag2now"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
