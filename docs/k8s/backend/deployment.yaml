apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttt2-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ttt2-backend
  template:
    metadata:
      labels:
        app: ttt2-backend
    spec:
      containers:
        - name: ttt2-backend
          image: <account-id>.dkr.ecr.<region>.amazonaws.com/ttt2-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rpcn-config
            - secretRef:
                name: rpcn-credentials
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
